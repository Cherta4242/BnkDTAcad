<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>카드결제 시스템?</title>
</head>
<body>

<h3>카드 결제</h3>
<hr>

<form action="/buy_ticket_card" method="POST">
	고객 아이디: <input type="text" name="consumerid"><br>
	티켓 구매 수: <input type="text" name="amount"><br>
	에러 발생 여부: <input type="text" name="error" value="0"><br>
	<input type="submit" value="구매">
</form>
<br>
<hr>
에러발생여부에 1을 입력하면 에러가 발생합니다.
</body>
</html>
