<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	body{
		text-align: center;
	}
</style>
</head>
<body>
	<h1>Memo List Page</h1>
	<hr>
	
	<div th:if="${session.username != null}"><a href="/memoRegForm">글쓰기</a></div>
	<div th:unless="${session.username != null}"><a href="/loginForm">로그인</a></div>
	<table border="1" style="width: 500px; margin: 0 auto;">
		<tr>
			<th>mno</th>
			<th>msg</th>
			<th>writer</th>
			<th>regDate</th>
		</tr>
		<tr th:each="memo, stat : ${memoList}">
			<td>[[${stat.count}]]</td>
			<td>[[${memo.message}]]</td>
			<td>[[${memo.member.username}]]</td>
			<td th:text="${#temporals.format(memo.regDate, 'yyyy년 MM월 dd일')}"></td>
	</table>
</body>
</html>
