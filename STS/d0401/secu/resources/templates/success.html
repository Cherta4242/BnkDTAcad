<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>로그인에 성공하셨습니다!</h1>
	<hr>
	
	<p><span sec:authentication="principal.name"></span> 님 환영합니다~</p>
	<p><span sec:authentication="principal.role"></span>등급이십니다!</p>
	
	<hr>
	<div sec:authorize="isAuthenticated()">
		<form th:action="@{/logout}" method="POST">
			<button type="submit">로그아웃</button>
		</form>
	</div>
	<div sec:authorize="isAnonymous()">
		<a href="/regist">회원가입</a><br>
		<a href="/login">로그인</a>	
	</div>
	
	
	<hr>
	<a th:href="@{/}">메인페이지로 돌아가기</a><br>
	
</body>
</html>
