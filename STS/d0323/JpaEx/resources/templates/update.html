<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>update Form</title>
</head>
<body>
	<h1>update Form</h1>
	<hr>
	
	<form th:action="@{/update}" method="POST">
		<input type="text" name="id" th:value="${member.id}" readonly><br>
		<input type="text" name="pw" th:value="${member.pw}"><br>
		<input type="text" name="name" th:value="${member.name}"><br>
		<input type="submit" value="업데이트"><br>
	</form>
</body>
</html>
