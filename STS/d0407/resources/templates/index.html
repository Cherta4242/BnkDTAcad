<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>Index Page</h1>
	<hr>
	<h2>토큰 발급(GET)</h2>
	<ul>
		<li><a href="/jwt-test/generate">기본 사용자</a></li>
		<li><a href="/jwt-test/generate?username=Cherta&role=MEMBER">Cherta(MEMBER)</a></li>
		<li><a href="/jwt-test/generate?username=Lumina&role=MEMBER">Lumina(ADMIN)</a></li>
	</ul>
	<hr>
	<h2>토큰 발급(POST)</h2>
	username: <input type="text" id="username"><br>
	role: <input type="text" id="role"><br>
	<button id="loginBtn">Login</button>
	<hr>
	
	<button onclick="func">요청</button>
	<div id="div1"></div>
	
	
	
	<script>
		//로그인 버튼 클릭 시
		document.getElementById("loginBtn").addEventListener('click', login);
		
		function login(){
			const username = document.querySelector("#username").value;
			const role = document.querySelector("#role").value;
			
			fetch('/jwt-test/generate2',{
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					username : username,
					role : role
				})
				
			})
			.then(response => response.json())
			.then(data => {
				console.log('Success', data);
				localStorage.setItem('accessToken', data.token);
			})
			.catch(error => console.log(error));
			
		}
	
		
		
	</script>
	
</body>
</html>
