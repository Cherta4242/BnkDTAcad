<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>Regist Page</h1>
	<hr>
	<form th:action="@{/regist}" method="POST">
		<input type="text" name="username" placeholder="사용하실 아이디를 입력해주세요"><br>
		<input type="password" name="password" placeholder="사용하실 비밀번호를 입력해주세요"><br>
		<input type="text" name="name" placeholder="사용하실 이름을 입력해주세요"><br>
		<input type="text" name="role" placeholder="당신의 권한을 입력해주세요"><br>
		<input type="submit" value="회원가입하기"><br>
	</form>
</body>
</html>
