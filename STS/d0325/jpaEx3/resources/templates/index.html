<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>index Page</h1>
	<hr>
	<table border="1">
		<tr>
			<th>번호</th>
			<th>아이디</th>
			<th>이름</th>
			<th>이메일</th>
			<th>나이</th>
			<th>active?</th>
			<th>날짜</th>
		</tr>
		<tr th:each="list, stat : ${list}">
			<td th:text="${stat.count}">
			<td th:text="${list.id}">
			<td th:text="${list.name}">
			<td th:text="${list.email}">
			<td th:text="${list.age}">
			<td th:text="${list.active}">
			<td th:text="${#temporals.format(list.regDate, 'yyyy년 MM월 dd일')}">
		<tr>
	</table>
	
	<a th:href="@{/testPage}">Test페이지!</a>
</body>
</html>
